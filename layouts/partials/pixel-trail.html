<!-- layouts/partials/pixel-trail.html -->
<canvas id="pixel-canvas" style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;"></canvas>

<script>
    (function(){
        const canvas=document.getElementById('pixel-canvas');
        const ctx=canvas.getContext('2d');
        let PS=20; // Pixel size (8–40)  → bigger = chunkier pixels
        let MT=60; // Trail length (20–120) → higher = longer tail
        let FS=4; // Fade speed (1–10) → higher = disappears faster
        let BC='#00b4d8'; // Base color → pick from the palette or set your own hex
        let cols=0,rows=0,grid=[],trail=[];

        function hexRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}

        function resize(){
            canvas.width=window.innerWidth;canvas.height=window.innerHeight;
            cols=Math.ceil(canvas.width/PS);rows=Math.ceil(canvas.height/PS);
            grid=Array.from({length:rows},()=>Array.from({length:cols},()=>({a:0})));
        }
        window.addEventListener('resize',resize);resize();

        window.addEventListener('mousemove',e=>{
            const c=Math.floor(e.clientX/PS),r=Math.floor(e.clientY/PS);
            if(r>=0&&r<rows&&c>=0&&c<cols){
                const cell=grid[r][c];
                if(cell.a<0.5){cell.a=1;trail.push({c,r});if(trail.length>MT)trail.shift();}
            }
        });

        function draw(){
            ctx.clearRect(0,0,canvas.width,canvas.height);
            const[r,g,b]=hexRgb(BC);
            const fr=FS*0.008;
            for(let i=0;i<trail.length;i++){
                const t=trail[i];const cell=grid[t.r][t.c];
                if(cell.a<=0)continue;
                const af=(i+1)/trail.length;const a=cell.a*af;
                // glow
                ctx.fillStyle=`rgba(${r},${g},${b},${a*0.12})`;
                ctx.beginPath();ctx.roundRect(t.c*PS-PS*0.75,t.r*PS-PS*0.75,PS*2.5,PS*2.5,4);ctx.fill();
                // pixel
                const ins=PS*0.06;
                ctx.fillStyle=`rgba(${r},${g},${b},${a*0.9})`;
                ctx.beginPath();ctx.roundRect(t.c*PS+ins,t.r*PS+ins,PS-ins*2,PS-ins*2,2);ctx.fill();
                // core
                ctx.fillStyle=`rgba(255,255,255,${a*0.3})`;
                const cs=PS*0.38,co=(PS-cs)/2;
                ctx.fillRect(t.c*PS+co,t.r*PS+co,cs,cs);
                cell.a=Math.max(0,cell.a-fr);
            }
            trail=trail.filter(t=>grid[t.r][t.c].a>0);
            requestAnimationFrame(draw);
        }
        draw();

        document.getElementById('pt-size').oninput=e=>{PS=+e.target.value;resize()};
        document.getElementById('pt-trail').oninput=e=>{MT=+e.target.value};
        document.getElementById('pt-fade').oninput=e=>{FS=+e.target.value};
        document.querySelectorAll('.pt-cb').forEach(btn=>{
            btn.onclick=()=>{
                document.querySelectorAll('.pt-cb').forEach(b=>b.style.borderColor='transparent');
                btn.style.borderColor='#fff';BC=btn.dataset.c;
            };
        });
    })();
</script>
